version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: shopify_agent_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: shopify_listing
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    container_name: shopify_agent_redis
    ports:
      - "6380:6379"
    restart: always

  web:
    build: .
    container_name: shopify_agent_web
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/code
      - static_data:/code/static
    environment:
      - ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/shopify_listing
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    depends_on:
      - db
      - redis

volumes:
  pgdata:
  static_data:
